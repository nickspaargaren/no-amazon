name: Code
on: push

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Python setup
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Type check
        run: mypy
      - name: Code formatting check
        run: black --check .
